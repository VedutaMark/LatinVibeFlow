<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пример HTML страницы</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 0; }
        header { background: #333; color: #fff; padding: 1rem; text-align: center; }
        main { padding: 20px; }
        footer { background: #333; color: #fff; text-align: center; padding: 10px; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>Добро пожаловать на мой сайт</h1>
    </header>

    <main>
        <h2>Заголовок раздела</h2>
        <p>Это пример простого текстового абзаца в HTML.</p>
        <p>Вот список важных элементов:</p>
        <ul>
            <li><a href="#">Главная</a></li>
            <li><a href="#">О нас</a></li>
            <li><a href="#">Контакты</a></li>
        </ul>
    </main>

    <footer>
        <p>&copy; 2026 Моя HTML-страница</p>
    </footer>

</body>
</html>
